<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>India Energy Transition Projects Map</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      color: #1f2937;
    }

    header {
      padding: 16px 20px;
      background: #0f172a;
      color: white;
    }

    header h1 {
      margin: 0;
      font-size: 24px;
    }

    header p {
      margin: 6px 0 0;
      font-size: 14px;
      opacity: 0.9;
    }

    #map {
      height: calc(100vh - 90px);
      width: 100%;
    }

    .popup-content {
      width: 240px;
    }

    .popup-content img {
      width: 100%;
      border-radius: 8px;
      margin-bottom: 8px;
    }

    .popup-content h3 {
      margin: 0 0 8px;
      font-size: 16px;
    }

    .popup-content p {
      margin: 0 0 6px;
      font-size: 13px;
      line-height: 1.4;
    }

    .popup-content .meta {
      font-size: 12px;
      color: #475569;
    }
  </style>
</head>
<body>
  <header>
    <h1>India Energy Transition Projects</h1>
    <p>Click on a marker to see a photo and key information about the project.</p>
  </header>

  <div id="map"></div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script>
    const map = L.map('map').setView([22.5, 79], 5);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 18,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const projects = [
      {
        name: 'Gujarat Hybrid Renewable Energy Park',
        coords: [23.85, 68.75],
        image: 'gujarat-hybrid.jpg',
        type: 'Solar + Wind Hybrid',
        capacity: '30 GW planned',
        consumerImpact: 'Tendency: aims to increase large-scale low-cost renewable supply over time.',
        startDate: '2020s development phase',
        workingTime: 'Under development; not yet operating as a full completed park.',
        info: 'A mega renewable hub in Kutch, Gujarat, representing India’s large-scale hybrid energy strategy.'
      },
      {
        name: 'Bhadla Solar Park',
        coords: [27.54, 72.24],
        image: 'images/bhadla.jpg',
        type: 'Solar PV',
        capacity: '2,245 MW',
        consumerImpact: 'Price tendency: helped push solar tariffs downward through large-scale generation.',
        startDate: '2015',
        workingTime: 'Operational since phased commissioning from 2015 onward.',
        info: 'One of India\'s largest solar parks in Rajasthan and a key example of utility-scale solar expansion.'
      },
      {
        name: 'Lower Subansiri Project',
        coords: [27.55, 94.02],
        image: 'images/lower-subansiri.jpg',
        type: 'Hydropower',
        capacity: '2,000 MW',
        consumerImpact: 'Tendency: intended to support long-term power supply, though hydropower costs and delays remain debated.',
        startDate: '2005 construction start',
        workingTime: 'Still under construction / not in regular long-term operation yet.',
        info: 'A major hydroelectric project on the Subansiri River with strong political, environmental, and regional significance.'
      },
      {
        name: 'Muppandal Wind Farm',
        coords: [8.25, 77.55],
        image: 'images/muppandal.jpg',
        type: 'Onshore Wind',
        capacity: 'About 1,500 MW',
        consumerImpact: 'Price tendency: supported cheaper renewable generation in Tamil Nadu over time.',
        startDate: '1990s',
        workingTime: 'Operating for decades, with continued use and expansion over time.',
        info: 'One of India\'s best-known onshore wind clusters, important for early wind development in Tamil Nadu.'
      }
    ];

    projects.forEach(project => {
      const popupHtml = `
        <div class="popup-content">
          <img src="${project.image}" alt="${project.name}" />
          <h3>${project.name}</h3>
          <p><strong>Type:</strong> ${project.type}</p>
          <p><strong>Capacity:</strong> ${project.capacity}</p>
          <p><strong>Consumer impact:</strong> ${project.consumerImpact}</p>
          <p><strong>Start date:</strong> ${project.startDate}</p>
          <p><strong>How long it works:</strong> ${project.workingTime}</p>
          <p>${project.info}</p>
        </div>
      `;

      L.marker(project.coords)
        .addTo(map)
        .bindPopup(popupHtml);
    });
  </script>
</body>
</html>
