<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>India Energy Transition Projects Map</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      color: #1f2937;
    }

    header {
      padding: 16px 20px;
      background: #0f172a;
      color: white;
    }

    header h1 {
      margin: 0;
      font-size: 24px;
    }

    header p {
      margin: 6px 0 0;
      font-size: 14px;
      opacity: 0.9;
    }

    #map {
      height: calc(100vh - 90px);
      width: 100%;
    }

    .popup-content {
      width: 240px;
    }

    .popup-content img {
      width: 100%;
      border-radius: 8px;
      margin-bottom: 8px;
    }

    .popup-content h3 {
      margin: 0 0 8px;
      font-size: 16px;
    }

    .popup-content p {
      margin: 0 0 6px;
      font-size: 13px;
      line-height: 1.4;
    }

    .popup-content .meta {
      font-size: 12px;
      color: #475569;
    }
  </style>
</head>
<body>
  <header>
    <h1>India Energy Transition Projects</h1>
    <p>Click on a marker to see a photo and key information about the project.</p>
  </header>

  <div id="map"></div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script>
    const map = L.map('map').setView([22.5, 79], 5);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 18,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const projects = [
      {
        name: 'Rewa Ultra Mega Solar',
        coords: [24.53, 81.30],
        image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/3/35/Solar_panels.jpg/640px-Solar_panels.jpg',
        type: 'Solar PV',
        capacity: '750 MW',
        info: 'A flagship solar PPP project in Madhya Pradesh, often presented as a model for scaling solar in India.'
      },
      {
        name: 'Bhadla Solar Park',
        coords: [27.54, 72.24],
        image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/6/6d/Solar_Panels.jpg/640px-Solar_Panels.jpg',
        type: 'Solar PV',
        capacity: '2,245 MW',
        info: 'One of India\'s best-known mega-solar parks, located in Rajasthan and important for large-scale desert solar development.'
      },
      {
        name: 'Khavda Renewable Energy Park',
        coords: [23.85, 68.75],
        image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/c/cd/Windmills_D1-D4_%28Thornton_Bank%29.jpg/640px-Windmills_D1-D4_%28Thornton_Bank%29.jpg',
        type: 'Solar + Wind Hybrid',
        capacity: '30 GW planned',
        info: 'A giant hybrid renewable project in Gujarat that represents India\'s current large-scale clean-energy ambition.'
      },
      {
        name: 'Gujarat Offshore Wind Project',
        coords: [21.60, 72.20],
        image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/44/Offshore_windpark_Thorntonbank.jpg/640px-Offshore_windpark_Thorntonbank.jpg',
        type: 'Offshore wind',
        capacity: '500 MW tendered',
        info: 'A first-step offshore wind project off Gujarat, useful for discussing India\'s future diversification into new clean-energy technologies.'
      }
    ];

    projects.forEach(project => {
      const popupHtml = `
        <div class="popup-content">
          <img src="${project.image}" alt="${project.name}" />
          <h3>${project.name}</h3>
          <p><strong>Type:</strong> ${project.type}</p>
          <p><strong>Capacity:</strong> ${project.capacity}</p>
          <p>${project.info}</p>
        </div>
      `;

      L.marker(project.coords)
        .addTo(map)
        .bindPopup(popupHtml);
    });
  </script>
</body>
</html>
